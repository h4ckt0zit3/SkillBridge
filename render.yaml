databases:
  - name: skillbridge-db
    databaseName: skillbridge
    user: skillbridge_user
    plan: free

services:
  - type: web
    name: skillbridge-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: MONITORING_API_KEY
        value: skillbridge-monitor-key-2024
